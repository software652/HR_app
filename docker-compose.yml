# Local development — mounts source for hot-reload
# Usage: docker compose up
services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: builder          # stop at build stage so tsx is available
    command: ["node_modules/.bin/tsx", "watch", "apps/api/src/server.ts"]
    working_dir: /app
    volumes:
      - ./apps/api/src:/app/apps/api/src:ro
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: development
      PORT: "4000"
      CORS_ORIGIN: "http://localhost:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: deps
    command: ["node_modules/.bin/next", "dev", "--port", "3000"]
    working_dir: /app/apps/web
    volumes:
      - ./apps/web/app:/app/apps/web/app:ro
      - ./apps/web/components:/app/apps/web/components:ro
      - ./apps/web/lib:/app/apps/web/lib:ro
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: "http://api:4000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
